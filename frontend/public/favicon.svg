<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Neon glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradient for main shape -->
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:1" />
    </linearGradient>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGrad)" stroke="#30363d" stroke-width="2"/>
  
  <!-- Inner hexagon shape (cyber aesthetic) -->
  <path d="M64 12 L108 38 L108 90 L64 116 L20 90 L20 38 Z" 
        fill="none" 
        stroke="url(#cyberGrad)" 
        stroke-width="3" 
        opacity="0.3"/>
  
  <!-- Terminal bracket left -->
  <path d="M32 44 L44 44 L44 48 L36 48 L36 80 L44 80 L44 84 L32 84 Z" 
        fill="url(#cyberGrad)" 
        filter="url(#glow)"/>
  
  <!-- Terminal bracket right -->
  <path d="M96 44 L84 44 L84 48 L92 48 L92 80 L84 80 L84 84 L96 84 Z" 
        fill="url(#cyberGrad)" 
        filter="url(#glow)"/>
  
  <!-- Center "C" for CyberOps -->
  <path d="M72 52 C72 52 78 48 78 56 L78 72 C78 80 72 76 72 76 L56 76 C48 76 52 72 52 72 L52 56 C52 48 56 52 56 52 L72 52 Z" 
        fill="none" 
        stroke="url(#cyberGrad)" 
        stroke-width="4" 
        stroke-linecap="round"
        filter="url(#glow)"/>
  
  <!-- Blinking cursor -->
  <rect x="60" y="58" width="8" height="12" fill="#00ff88" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Corner accents -->
  <path d="M16 24 L16 16 L24 16" stroke="#00ff88" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M104 16 L112 16 L112 24" stroke="#00ff88" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M112 104 L112 112 L104 112" stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M24 112 L16 112 L16 104" stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.6"/>
</svg>


